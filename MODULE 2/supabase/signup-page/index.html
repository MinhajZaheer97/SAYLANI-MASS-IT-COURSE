<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <script type="module" src="app.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #0f172a, #312e81, #7c3aed);
            color: #e5e7eb;
        }

        body::before,
        body::after {
            content: "";
            position: absolute;
            border-radius: 50%;
            filter: blur(30px);
            opacity: 0.35;
            pointer-events: none;
        }

        body::before {
            width: 240px;
            height: 240px;
            background: #8b5cf6;
            top: -60px;
            left: -40px;
        }

        body::after {
            width: 260px;
            height: 260px;
            background: #38bdf8;
            bottom: -80px;
            right: -50px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            width: 100%;
            max-width: 400px;
            padding: 32px;
            border-radius: 24px;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.28);
            border: 1px solid rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            position: relative;
            z-index: 1;
        }

        .card .badge {
            width: 54px;
            height: 54px;
            margin: 0 auto 14px;
            border-radius: 16px;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            font-size: 24px;
            font-weight: 700;
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.35);
        }

        .card h2 {
            margin: 0 0 8px;
            text-align: center;
            color: #111827;
            font-size: 24px;
        }

        .card p {
            margin: 0 0 22px;
            text-align: center;
            color: #6b7280;
            font-size: 14px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        label {
            font-size: 14px;
            color: #374151;
            font-weight: 700;
        }

        input {
            padding: 13px 14px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            outline: none;
            font-size: 14px;
            transition: all 0.2s ease;
            background: #f9fafb;
        }

        input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.16);
            background: white;
        }

        .input-error {
            border-color: #dc2626;
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.15);
        }

        button {
            margin-top: 8px;
            padding: 13px;
            border: none;
            border-radius: 999px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 10px 22px rgba(99, 102, 241, 0.28);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(99, 102, 241, 0.35);
        }

        .error-message {
            display: none;
            margin: 0;
            color: #dc2626;
            font-size: 13px;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="badge">✦</div>
        <h2>Create Account</h2>
        <p>Sign up to get started</p>
        <form>
            <label for="gmail">Gmail</label>
            <input id="gmail" type="email" placeholder="yourname@gmail.com" required />

            <label for="username">Username</label>
            <input id="username" type="text" placeholder="Enter username" required />

            <label for="password">Password</label>
            <input id="password" type="password" placeholder="Enter password" required />

            <button id="btn" type="button">Sign Up</button>
        </form>
    </div>
</body>
</html>
