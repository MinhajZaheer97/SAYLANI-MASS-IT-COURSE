<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <script type="module" src="./app.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: white;
            width: 100%;
            max-width: 380px;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .card h2 {
            margin: 0 0 8px;
            text-align: center;
            color: #1f2937;
        }

        .card p {
            margin: 0 0 20px;
            text-align: center;
            color: #6b7280;
            font-size: 14px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        label {
            font-size: 14px;
            color: #374151;
            font-weight: 600;
        }

        input {
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            outline: none;
            font-size: 14px;
        }

        input:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
        }

        button {
            margin-top: 8px;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #4f46e5;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            background: #4338ca;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Create Account</h2>
        <p>Sign up to get started</p>
        <form>
            <label for="gmail">Gmail</label>
            <input id="gmail" type="email" placeholder="yourname@gmail.com" required />

            <label for="username">Username</label>
            <input id="username" type="text" placeholder="Enter username" required />

            <label for="password">Password</label>
            <input id="password" type="password" placeholder="Enter password" required />

            <button id="btn" type="button">Sign Up</button>
        </form>
    </div>
</body>
</html>
